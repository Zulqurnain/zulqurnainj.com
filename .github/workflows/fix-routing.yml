name: Fix Email Routing

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      H: ${{ secrets.CPANEL_HOST }}
      U: ${{ secrets.CPANEL_USER }}
      P: ${{ secrets.CPANEL_PASS }}
      D: zulqurnainj.com
      GT: ${{ secrets.GITHUB_TOKEN }}
      GR: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
      - name: run fix_routing.py
        run: python3 scripts/fix_routing.py
