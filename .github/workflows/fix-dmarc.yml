name: Fix DMARC Record

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  dmarc:
    runs-on: ubuntu-latest
    env:
      H: ${{ secrets.CPANEL_HOST }}
      U: ${{ secrets.CPANEL_USER }}
      P: ${{ secrets.CPANEL_PASS }}
      D: zulqurnainj.com
      EU: me@zulqurnainj.com
      GT: ${{ secrets.GITHUB_TOKEN }}
      GR: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
      - name: install dig
        run: sudo apt-get install -y dnsutils -q
      - name: update DMARC with rua+ruf reporting
        run: python3 scripts/fix_dmarc.py
