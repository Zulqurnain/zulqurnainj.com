name: Add tools DNS A record

on:
  workflow_dispatch:

jobs:
  add-dns:
    runs-on: ubuntu-latest
    env:
      H: ${{ secrets.CPANEL_HOST }}
      U: ${{ secrets.CPANEL_USER }}
      P: ${{ secrets.CPANEL_PASS }}
    steps:
      - name: Add A record for tools.zulqurnainj.com
        run: |
          cat > /tmp/dns.py << 'PYEOF'
          import os, subprocess, json
          h, u, p = os.environ['H'], os.environ['U'], os.environ['P']
          uapi = "https://" + h + ":2083/execute"
          domain = "zulqurnainj.com"
          vps_ip = "193.187.129.119"
          def cget(url):
              return subprocess.check_output(['curl','-sk','-u',u+':'+p,url], text=True, timeout=30)
          def cpost(url, data):
              cmd = ['curl','-sk','-u',u+':'+p,'-X','POST']
              for k,v in data.items():
                  cmd += ['--data-urlencode', k+'='+v]
              cmd.append(url)
              return subprocess.check_output(cmd, text=True, timeout=30)
          print("cPanel host:", h)
          r = cget(uapi+"/ZoneEdit/fetch_zone_records?domain="+domain+"&type=A")
          print("Current A records:", r[:1000])
          r2 = cpost(uapi+"/ZoneEdit/add_zone_record", {"domain":domain,"type":"A","name":"tools","address":vps_ip,"ttl":"300"})
          print("Add result:", r2[:500])
          r3 = cget(uapi+"/ZoneEdit/fetch_zone_records?domain="+domain+"&type=A")
          print("After add:", r3[:1000])
          PYEOF
          python3 /tmp/dns.py
