name: Check Email Inbox

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Read IMAP inbox for me@zulqurnainj.com
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
      CPANEL_USER: ${{ secrets.CPANEL_USER }}
      CPANEL_PASS: ${{ secrets.CPANEL_PASS }}
      EMAIL_USER: me@zulqurnainj.com
      EMAIL_PASS: ${{ secrets.EMAIL_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Send test email + read inbox via IMAP
        run: |
          sudo apt-get install -y sshpass -q

          echo "=== Sending test email via SSH+sendmail ==="
          sshpass -p "$CPANEL_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 \
            -p 21098 \
            "$CPANEL_USER@$CPANEL_HOST" \
            "printf 'To: me@zulqurnainj.com\nFrom: Zulqurnain Haider <me@zulqurnainj.com>\nSubject: Inbox check $(date +%H:%M:%S)\nContent-Type: text/plain\n\nLocal delivery test. Sent at: $(date)\n' | /usr/sbin/sendmail -v me@zulqurnainj.com" \
            && echo "Sent ok" || echo "SSH failed"

          echo "Waiting 12s for delivery..."
          sleep 12

          python3 << 'PYEOF'
          import imaplib, os, email as emaillib, json
          from email.header import decode_header

          host   = os.environ['CPANEL_HOST']
          user   = os.environ['EMAIL_USER']
          passwd = os.environ['EMAIL_PASS']

          result = {"login": False, "inbox_count": 0, "spam_count": 0, "messages": [], "error": None}

          try:
              M = imaplib.IMAP4_SSL(host, 993)
              M.login(user, passwd)
              result["login"] = True

              status, msgs = M.select('INBOX')
              count = int(msgs[0])
              result["inbox_count"] = count

              if count > 0:
                  start = max(1, count - 4)
                  typ, data = M.fetch(f'{start}:{count}', '(RFC822.HEADER)')
                  for item in data:
                      if isinstance(item, tuple):
                          msg = emaillib.message_from_bytes(item[1])
                          subj_raw = msg.get('Subject', '(no subject)')
                          parts = decode_header(subj_raw)
                          subj = ''.join(
                              p.decode(enc or 'utf-8') if isinstance(p, bytes) else p
                              for p, enc in parts
                          )
                          result["messages"].append({
                              "from": msg.get('From', '?'),
                              "subject": subj,
                              "date": msg.get('Date', '?')
                          })

              for folder in ['INBOX.spam', 'Junk', 'Spam']:
                  st, d = M.select(folder, readonly=True)
                  if st == 'OK':
                      result["spam_count"] = int(d[0])
                      result["spam_folder"] = folder
                      break

              M.logout()
          except Exception as e:
              result["error"] = str(e)

          with open('email-inbox-result.json', 'w') as f:
              json.dump(result, f, indent=2)

          print(json.dumps(result, indent=2))
          PYEOF

      - name: Post results as GitHub issue
        run: |
          RESULT=$(cat email-inbox-result.json)
          LOGIN=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('YES' if d.get('login') else 'NO')")
          COUNT=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('inbox_count',0))")
          SPAM=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('spam_count',0))")
          ERR=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('error') or 'none')")
          MSGS=$(echo "$RESULT" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for m in d.get('messages',[]):
              print(f'- **From:** {m[\"from\"]}')
              print(f'  **Subject:** {m[\"subject\"]}')
              print(f'  **Date:** {m[\"date\"]}')
              print()
          " || echo "(none)")

          BODY="## IMAP Inbox Check Results

**IMAP login:** $LOGIN
**Inbox count:** $COUNT
**Spam count:** $SPAM
**Error:** $ERR

### Last messages:
$MSGS

_Run: ${{ github.run_id }} | $(date -u)_"

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues" \
            -d "{\"title\":\"[email-check] Inbox result $(date -u +%H:%M)\",\"body\":$(echo "$BODY" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Issue:', d.get('number'), d.get('html_url','FAILED'))"
