name: Email Setup

on:
  workflow_dispatch:

jobs:
  setup-email:
    name: Create me@zulqurnainj.com on cPanel
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
      CPANEL_USER: ${{ secrets.CPANEL_USER }}
      CPANEL_PASS: ${{ secrets.CPANEL_PASS }}
      EMAIL_USER: me
      EMAIL_DOMAIN: zulqurnainj.com
      EMAIL_PASS: ${{ secrets.EMAIL_PASSWORD }}

    steps:
      - name: Check existing email accounts
        run: |
          echo "=== Listing existing email accounts ==="
          curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/Email/list_pops?domain=$EMAIL_DOMAIN" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('Status:', d.get('status'))
          accts = d.get('data', [])
          if accts:
              for a in accts: print(' -', a.get('email'))
          else:
              print(' (no accounts yet)')
          "

      - name: Create me@zulqurnainj.com
        run: |
          echo "=== Creating / updating email account ==="
          RESULT=$(curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/Email/add_pop" \
            --data-urlencode "email=$EMAIL_USER" \
            --data-urlencode "domain=$EMAIL_DOMAIN" \
            --data-urlencode "password=$EMAIL_PASS" \
            --data-urlencode "quota=0")
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status'))")
          echo "$RESULT" | python3 -c "
          import sys, json; d = json.load(sys.stdin)
          print('Status:', d.get('status'))
          print('Errors:', d.get('errors'))
          print('Messages:', d.get('messages'))
          "
          # If account already exists (status 0), update its password
          if [ "$STATUS" = "0" ]; then
            echo "Account exists — updating password..."
            curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
              "https://$CPANEL_HOST:2083/execute/Email/passwd_pop" \
              --data-urlencode "email=$EMAIL_USER" \
              --data-urlencode "domain=$EMAIL_DOMAIN" \
              --data-urlencode "password=$EMAIL_PASS" | python3 -c "
          import sys, json; d = json.load(sys.stdin)
          print('Password update status:', d.get('status'), d.get('errors'))" || true
          fi

      - name: Check MX records and email routing
        run: |
          echo "=== Email routing ==="
          curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/Email/get_mx?domain=$EMAIL_DOMAIN" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          data = d.get('data', {})
          print('Status:', d.get('status'))
          print('detected_mx:', data.get('detected_mx'))
          print('local:', data.get('local'))
          " || true

          echo "=== DNS zone MX records ==="
          curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/ZoneEdit/fetch_zone_records?domain=$EMAIL_DOMAIN" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          records = d.get('data', [])
          mx = [r for r in records if r.get('type') == 'MX']
          print(f'{len(mx)} MX record(s):')
          for r in mx:
              print(f'  Priority {r.get(\"preference\",\"?\")} -> {r.get(\"exchange\",\"?\")}')
          if not mx:
              print('NO MX — will add')
              print('NEED_MX=true')
          " 2>&1 | tee /tmp/mx_check.txt
          grep -q 'NEED_MX=true' /tmp/mx_check.txt && echo "NEED_MX=true" >> "$GITHUB_ENV" || true

      - name: Add MX record if missing
        if: env.NEED_MX == 'true'
        run: |
          echo "=== Adding MX record ==="
          curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/ZoneEdit/add_zone_record" \
            --data-urlencode "domain=$EMAIL_DOMAIN" \
            --data-urlencode "type=MX" \
            --data-urlencode "name=$EMAIL_DOMAIN." \
            --data-urlencode "exchange=mail.$EMAIL_DOMAIN." \
            --data-urlencode "preference=10" \
            | python3 -c "
          import sys, json; d = json.load(sys.stdin)
          print('Add MX status:', d.get('status'), d.get('errors'))"

      - name: Verify account and show settings
        run: |
          echo "=== Verifying account ==="
          curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/Email/list_pops?domain=$EMAIL_DOMAIN" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for a in d.get('data', []):
              if 'me@' in a.get('login','') or a.get('email','').startswith('me@'):
                  print('✓ Account confirmed:', a.get('email'))
                  break
          else:
              print('✗ me@zulqurnainj.com not found in list')
          "
          echo ""
          echo "=== Connection Settings ==="
          echo "SMTP: $CPANEL_HOST port 465 (SSL) or 587 (STARTTLS)"
          echo "IMAP: $CPANEL_HOST port 993 (SSL)"
          echo "User: me@zulqurnainj.com"
          echo "Webmail: https://$CPANEL_HOST/webmail"

      - name: Send test email via SSH + server-side sendmail
        run: |
          echo "=== Installing sshpass ==="
          sudo apt-get install -y sshpass -q

          echo "=== Sending test email from the server via SSH ==="
          # SSH into the hosting server and run sendmail locally (bypasses IP blocks)
          sshpass -p "$CPANEL_PASS" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 \
            -p 21098 \
            "$CPANEL_USER@$CPANEL_HOST" \
            "printf 'To: me@zulqurnainj.com\nFrom: Zulqurnain Haider <me@zulqurnainj.com>\nSubject: Test - me@zulqurnainj.com is working!\nContent-Type: text/plain\n\nThis test email confirms me@zulqurnainj.com can send and receive.\n\n-- Zulqurnain Haider\nhttps://zulqurnainj.com\n' | /usr/sbin/sendmail -v me@zulqurnainj.com" \
            && echo "✅ Test email sent from server via SSH+sendmail" \
            || echo "⚠ SSH+sendmail failed — trying direct SMTP from runner (may fail if runner IP is blocked)"

          echo ""
          echo "=== Trying SMTP directly (runner IP may be blocked by host) ==="
          python3 << 'PYEOF'
          import smtplib, os, sys
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          host   = os.environ["CPANEL_HOST"]
          uname  = "me@zulqurnainj.com"
          passwd = os.environ["EMAIL_PASS"]

          msg = MIMEMultipart("alternative")
          msg["Subject"] = "Test: me@zulqurnainj.com is working!"
          msg["From"]    = f"Zulqurnain Haider <{uname}>"
          msg["To"]      = uname
          msg.attach(MIMEText(
              "Test email — me@zulqurnainj.com can send and receive. ✅\n\n-- Zulqurnain",
              "plain"))

          for label, factory in [
              ("SMTP_SSL port 465", lambda: smtplib.SMTP_SSL(host, 465, timeout=20)),
              ("STARTTLS port 587", lambda: smtplib.SMTP(host, 587, timeout=20)),
          ]:
              try:
                  with factory() as s:
                      if "STARTTLS" in label:
                          s.starttls()
                      s.login(uname, passwd)
                      s.sendmail(uname, [uname], msg.as_string())
                  print(f"✅ SMTP sent via {label}")
                  break
              except Exception as e:
                  print(f"✗ {label}: {e}")
          PYEOF
          # SMTP test is informational — do not fail the job
          exit 0

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "============================================"
          echo "  EMAIL SETUP SUMMARY"
          echo "============================================"
          echo "  Address : me@zulqurnainj.com"
          echo "  SMTP    : $CPANEL_HOST:465 (SSL)"
          echo "  IMAP    : $CPANEL_HOST:993 (SSL)"
          echo "  Webmail : https://$CPANEL_HOST/webmail"
          echo "  Username: me@zulqurnainj.com"
          echo "============================================"
