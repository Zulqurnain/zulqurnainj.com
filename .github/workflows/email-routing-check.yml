name: Email Routing Status

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
      CPANEL_USER: ${{ secrets.CPANEL_USER }}
      CPANEL_PASS: ${{ secrets.CPANEL_PASS }}
      EMAIL_DOMAIN: zulqurnainj.com
      EMAIL_USER: me@zulqurnainj.com
      EMAIL_PASS: ${{ secrets.EMAIL_PASSWORD }}

    steps:
      - name: Check routing + fix + send + verify
        run: |
          sudo apt-get install -y sshpass -q 2>/dev/null

          echo "--- 1. Current get_mx response ---"
          MX_RAW=$(curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/Email/get_mx?domain=$EMAIL_DOMAIN")
          echo "$MX_RAW" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d,indent=2))" 2>&1 || echo "$MX_RAW"

          echo ""
          echo "--- 2. Calling set_mx with mxcheck=local ---"
          curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            -X POST \
            "https://$CPANEL_HOST:2083/execute/Email/set_mx" \
            --data-urlencode "domain=$EMAIL_DOMAIN" \
            --data-urlencode "mxcheck=local" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d,indent=2))" 2>&1

          echo ""
          echo "--- 3. Calling set_always_accept=1 ---"
          curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            -X POST \
            "https://$CPANEL_HOST:2083/execute/Email/set_always_accept" \
            --data-urlencode "domain=$EMAIL_DOMAIN" \
            --data-urlencode "value=1" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d,indent=2))" 2>&1

          echo ""
          echo "--- 4. get_mx after fix ---"
          MX_AFTER=$(curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/Email/get_mx?domain=$EMAIL_DOMAIN")
          echo "$MX_AFTER" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d,indent=2))" 2>&1

          echo ""
          echo "--- 5. Sending test email via SSH+sendmail ---"
          sshpass -p "$CPANEL_PASS" ssh \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 -p 21098 \
            "$CPANEL_USER@$CPANEL_HOST" \
            "/usr/sbin/sendmail -v $EMAIL_USER <<'MAILEOF'
To: $EMAIL_USER
From: $EMAIL_USER
Subject: routing-check-test-$(date +%s)
Content-Type: text/plain

routing-check test at $(date)
MAILEOF" 2>&1 || true

          echo "Waiting 20s for delivery..."
          sleep 20

          echo ""
          echo "--- 6. Check inbox via IMAP ---"
          python3 - << 'PYEOF'
          import imaplib, os, email as em, json, urllib.request
          from email.header import decode_header

          host   = os.environ['CPANEL_HOST']
          user   = os.environ['EMAIL_USER']
          passwd = os.environ['EMAIL_PASS']
          token  = os.environ['GITHUB_TOKEN']
          repo   = os.environ['GITHUB_REPOSITORY']

          lines = []
          try:
              M = imaplib.IMAP4_SSL(host, 993)
              M.login(user, passwd)
              _, msgs = M.select('INBOX')
              count = int(msgs[0])
              lines.append(f"Inbox count: {count}")
              if count > 0:
                  _, data = M.fetch(str(count), '(RFC822.HEADER)')
                  if data and isinstance(data[0], tuple):
                      msg = em.message_from_bytes(data[0][1])
                      lines.append(f"Latest subject: {msg.get('Subject','?')}")
                      lines.append(f"Latest from: {msg.get('From','?')}")
                      lines.append(f"Latest date: {msg.get('Date','?')}")
              else:
                  lines.append("Inbox STILL empty after sendmail test")
              M.logout()
          except Exception as e:
              lines.append(f"IMAP error: {e}")

          print('\n'.join(lines))
          PYEOF

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Post full results as issue
        if: always()
        run: |
          # Re-run the checks and post everything to an issue
          MX_JSON=$(curl -sk -u "$CPANEL_USER:$CPANEL_PASS" \
            "https://$CPANEL_HOST:2083/execute/Email/get_mx?domain=$EMAIL_DOMAIN" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d,indent=2))" 2>&1)

          python3 - << PYEOF
          import json, urllib.request, os
          token = os.environ['GITHUB_TOKEN']
          repo  = os.environ['GITHUB_REPOSITORY']
          mx    = """$MX_JSON"""

          body = f"""## Email Routing Status Report

### get_mx API response (current):
\`\`\`json
{mx}
\`\`\`

### What to look for:
- \`local\`: 1 → mail is routed locally ✅
- \`local\`: 0 → mail is routed remotely ❌ (relay loop)
- \`always_accept\`: 1 → server always accepts for this domain ✅
"""
          payload = json.dumps({"title": "[routing-check] Email routing status", "body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json", "Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as r:
              d = json.loads(r.read())
              print(f"Issue #{d['number']}: {d['html_url']}")
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
