name: Exim Mail Routing Debug

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  debug:
    runs-on: ubuntu-latest
    env:
      CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
      CPANEL_USER: ${{ secrets.CPANEL_USER }}
      CPANEL_PASS: ${{ secrets.CPANEL_PASS }}

    steps:
      - name: SSH debug + post issue
        run: |
          sudo apt-get install -y sshpass -q 2>/dev/null

          OUTPUT=$(sshpass -p "$CPANEL_PASS" ssh \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 -p 21098 \
            "$CPANEL_USER@$CPANEL_HOST" bash << 'SSHEOF'
          echo "=== Exim address test ==="
          /usr/sbin/exim -bt me@zulqurnainj.com 2>&1 || true

          echo ""
          echo "=== Is zulqurnainj.com a local domain? ==="
          grep -r "zulqurnainj.com" /etc/localdomains /etc/userdomains /etc/trueuserdomains 2>/dev/null | head -20 || echo "(files not readable)"

          echo ""
          echo "=== Virtual domain map ==="
          cat /etc/vdomainaliases/zulqurnainj.com 2>/dev/null || echo "(no vdomain file)"

          echo ""
          echo "=== Mailbox check ==="
          ls -la ~/mail/zulqurnainj.com/me/ 2>/dev/null || ls -la ~/Maildir/ 2>/dev/null || echo "(maildir not found at expected paths)"

          echo ""
          echo "=== cPanel email routing setting ==="
          cat /etc/cpanel/domain_mxs 2>/dev/null | grep -i zulqurnain || echo "(no domain_mxs entry)"

          echo ""
          echo "=== Recent exim mail log (last 20 lines) ==="
          tail -20 /var/log/exim4/mainlog 2>/dev/null || tail -20 /var/log/exim_mainlog 2>/dev/null || echo "(log not readable)"
          SSHEOF
          )

          echo "$OUTPUT"

          # Post to GitHub issue
          python3 - << PYEOF
          import json, urllib.request, os
          token = os.environ['GITHUB_TOKEN']
          repo  = os.environ['GITHUB_REPOSITORY']
          body  = """$OUTPUT"""
          payload = json.dumps({
              "title": "[exim-debug] Mail routing check",
              "body": f"## Exim Routing Debug\n\n\`\`\`\n{body[:60000]}\n\`\`\`"
          }).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github.v3+json",
                  "Content-Type": "application/json"
              }
          )
          with urllib.request.urlopen(req) as r:
              d = json.loads(r.read())
              print(f"Issue #{d['number']} created")
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
