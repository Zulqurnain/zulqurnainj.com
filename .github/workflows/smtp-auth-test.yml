name: SMTP Auth Send Test

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  smtp-auth:
    runs-on: ubuntu-latest
    env:
      H: ${{ secrets.CPANEL_HOST }}
      EU: me@zulqurnainj.com
      EP: ${{ secrets.EMAIL_PASSWORD }}
      GT: ${{ secrets.GITHUB_TOKEN }}
      GR: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
      - name: send authenticated email and verify IMAP delivery
        run: python3 scripts/smtp_send_test.py
