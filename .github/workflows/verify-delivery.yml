name: Verify Email Delivery

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      H: ${{ secrets.CPANEL_HOST }}
      U: ${{ secrets.CPANEL_USER }}
      P: ${{ secrets.CPANEL_PASS }}
      D: zulqurnainj.com
      EU: me@zulqurnainj.com
      EP: ${{ secrets.EMAIL_PASSWORD }}
      GT: ${{ secrets.GITHUB_TOKEN }}
      GR: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
      - name: install sshpass
        run: sudo apt-get install -y sshpass -q
      - name: verify routing and test delivery
        run: python3 scripts/verify_and_wait.py
