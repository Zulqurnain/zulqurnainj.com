name: Fix SSL for tools subdomain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose SSL and post to Gist
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          envs: GH_PAT
          script: |
            OUT=""

            OUT="${OUT}\n=== ACTUAL cert (server->server) ==="
            CERT=$(echo | openssl s_client -connect tools.zulqurnainj.com:443 -servername tools.zulqurnainj.com 2>/dev/null | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null || echo "openssl failed")
            OUT="${OUT}\n${CERT}"

            OUT="${OUT}\n=== HTTP redirect test ==="
            HTTP_TEST=$(curl -sv --max-time 5 "http://tools.zulqurnainj.com/.well-known/acme-challenge/test" 2>&1 | grep -E "(< HTTP|Location|redirect)" | head -5)
            OUT="${OUT}\n${HTTP_TEST}"

            OUT="${OUT}\n=== ACME challenge path test ==="
            echo testvalue > ~/tools.zulqurnainj.com/.well-known/acme-challenge/testtoken 2>/dev/null || true
            ACME_TEST=$(curl -s --max-time 5 "http://tools.zulqurnainj.com/.well-known/acme-challenge/testtoken" 2>&1)
            rm -f ~/tools.zulqurnainj.com/.well-known/acme-challenge/testtoken
            OUT="${OUT}\nACME returned: [${ACME_TEST}]"

            OUT="${OUT}\n=== existing SSL certs ==="
            CERTS=$(uapi SSL list_certs 2>&1 | python3 -c "import sys,json; [print(c.get('subject',{}).get('commonName','?'),'|',str(c.get('domains',''))) for c in json.load(sys.stdin).get('result',{}).get('data',[])]" 2>&1)
            OUT="${OUT}\n${CERTS}"

            OUT="${OUT}\n=== autossl coverage ==="
            COV=$(uapi SSL check_autossl_coverage 2>&1 | head -80)
            OUT="${OUT}\n${COV}"

            OUT="${OUT}\n=== LetsEncrypt install ==="
            LE=$(uapi LetsEncrypt install_ssl domains='[{"domain":"tools.zulqurnainj.com","wildcard":false}]' 2>&1 | head -20)
            OUT="${OUT}\n${LE}"

            OUT="${OUT}\n=== autossl start ==="
            AS=$(uapi SSL start_autossl_check 2>&1 | head -10)
            OUT="${OUT}\n${AS}"

            BODY=$(printf '%b' "$OUT")
            if [ -n "$GH_PAT" ]; then
              JSON=$(python3 -c "import sys,json; print(json.dumps({'public':False,'files':{'ssl-diag.txt':{'content':sys.stdin.read()}}}))" <<< "$BODY")
              GIST=$(curl -s -X POST "https://api.github.com/gists" \
                -H "Authorization: token $GH_PAT" \
                -H "Content-Type: application/json" \
                -d "$JSON")
              echo "$GIST" | python3 -c "import sys,json; d=json.load(sys.stdin); print('GIST URL:', d.get('html_url', d.get('message','error')))"
            else
              echo "GH_PAT not set, cannot post Gist"
              echo "$BODY"
            fi

      - name: Wait 5 min for AutoSSL
        run: sleep 300

      - name: Verify cert
        run: |
          RESULT=$(echo | openssl s_client -connect tools.zulqurnainj.com:443 -servername tools.zulqurnainj.com 2>/dev/null | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null)
          echo "$RESULT"
          echo "$RESULT" | grep -qi "tools.zulqurnainj.com" && echo "PASS" || { echo "FAIL"; exit 1; }
