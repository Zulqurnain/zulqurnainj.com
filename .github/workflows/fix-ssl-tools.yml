name: Fix SSL for tools subdomain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose and fix SSL via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: |
            echo "=== Domains known to cPanel ==="
            uapi DomainInfo domains_data || true

            echo "=== AutoSSL domain check ==="
            uapi SSL check_autossl_coverage 2>/dev/null || true

            echo "=== List existing certs ==="
            uapi SSL list_certs 2>/dev/null \
              | python3 -c "import sys,json; [print(c.get('domains',''),c.get('subject',{}).get('commonName','')) for c in json.load(sys.stdin).get('result',{}).get('data',[])]" \
              || true

            echo "=== Try issuing Let's Encrypt via uapi ==="
            uapi LetsEncrypt install_ssl \
              domains='[{"domain":"tools.zulqurnainj.com","wildcard":false}]' 2>/dev/null \
              && echo "LE issued" || echo "LE uapi failed"

            echo "=== AutoSSL force run ==="
            uapi SSL start_autossl_check 2>/dev/null || true

            echo "=== Check cPanel version of autossl ==="
            /usr/local/cpanel/bin/autossl_check --user="$USER" 2>/dev/null \
              && echo "autossl_check done" || echo "autossl_check binary not accessible"

            echo "=== Final cert check ==="
            uapi SSL fetch_best_for_domain domain=tools.zulqurnainj.com 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin).get('result',{}).get('data',{}); print('domains:', d.get('domains',[])); print('CN:', d.get('subject',{}).get('commonName',''))" \
              || true

      - name: Wait 90s then verify
        run: sleep 90

      - name: Verify cert from runner — FAIL if not valid
        run: |
          echo "=== Checking TLS cert ==="
          RESULT=$(echo | openssl s_client \
            -connect tools.zulqurnainj.com:443 \
            -servername tools.zulqurnainj.com 2>/dev/null \
            | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null)
          echo "$RESULT"
          if echo "$RESULT" | grep -qi "tools.zulqurnainj.com"; then
            echo "PASS: cert valid for tools.zulqurnainj.com"
          else
            echo "FAIL: cert missing tools.zulqurnainj.com"
            exit 1
          fi
