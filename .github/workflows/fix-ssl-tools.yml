name: Fix SSL for tools subdomain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Disable HTTP redirect + run AutoSSL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: |
            echo "=== Disabling force-HTTPS for tools subdomain ==="
            uapi HTTP disable_force_https domain=tools.zulqurnainj.com 2>&1 || true
            uapi HTTP update_always_redirect domain=tools.zulqurnainj.com redirect_to_ssl=0 2>&1 || true

            echo "=== Current HTTP redirect status ==="
            uapi HTTP get_always_redirect domain=tools.zulqurnainj.com 2>&1 || true

            echo "=== Testing ACME HTTP path (expect 200 or file content) ==="
            mkdir -p ~/tools.zulqurnainj.com/.well-known/acme-challenge/
            echo testval > ~/tools.zulqurnainj.com/.well-known/acme-challenge/tok
            curl -sv --max-time 5 http://tools.zulqurnainj.com/.well-known/acme-challenge/tok 2>&1 | grep -E "(< HTTP|testval|redirect|Location)"
            rm -f ~/tools.zulqurnainj.com/.well-known/acme-challenge/tok

            echo "=== Running AutoSSL ==="
            uapi SSL start_autossl_check 2>&1

            echo "=== LetsEncrypt install ==="
            uapi LetsEncrypt install_ssl domains='[{"domain":"tools.zulqurnainj.com","wildcard":false}]' 2>&1 | head -20 || true

            echo "Done"

      - name: Wait 5 min for cert provisioning
        run: sleep 300

      - name: Verify cert from runner — FAIL if missing
        run: |
          RESULT=$(echo | openssl s_client -connect tools.zulqurnainj.com:443 -servername tools.zulqurnainj.com 2>/dev/null | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null)
          echo "$RESULT"
          echo "$RESULT" | grep -qi "tools.zulqurnainj.com" && echo "PASS" || { echo "FAIL"; exit 1; }

      - name: Re-enable HTTPS redirect after cert is valid
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: |
            echo "Re-enabling HTTPS redirect for tools.zulqurnainj.com"
            uapi HTTP enable_force_https domain=tools.zulqurnainj.com 2>&1 || true
