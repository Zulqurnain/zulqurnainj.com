name: Fix SSL for tools subdomain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Pre-check from runner
        run: |
          echo "=== HTTP test (no follow) ==="
          curl -v --max-time 10 -o /dev/null http://tools.zulqurnainj.com/.well-known/acme-challenge/preflight 2>&1 | grep -E "(< HTTP|Location|Connected to)" || true
          echo "=== Current cert SAN ==="
          echo | openssl s_client -connect tools.zulqurnainj.com:443 -servername tools.zulqurnainj.com 2>/dev/null | openssl x509 -noout -subject -ext subjectAltName 2>/dev/null || echo "no valid cert or connect failed"

      - name: SSH - diagnose + patch .htaccess + run AutoSSL + post issue
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          envs: GH_PAT
          script: |
            {
              echo "=== DATE ==="
              date
              echo "=== .htaccess ==="
              cat ~/tools.zulqurnainj.com/.htaccess 2>/dev/null || echo none
              echo "=== HTTP redirect status ==="
              uapi HTTP get_always_redirect domain=tools.zulqurnainj.com 2>&1 || true
              echo "=== SSL list_certs ==="
              uapi SSL list_certs 2>&1 | head -80
              echo "=== Disabling force-HTTPS ==="
              uapi HTTP disable_force_https domain=tools.zulqurnainj.com 2>&1 || true
              uapi HTTP update_always_redirect domain=tools.zulqurnainj.com redirect_to_ssl=0 2>&1 || true
              echo "=== Patching .htaccess ==="
              cp ~/tools.zulqurnainj.com/.htaccess ~/tools.zulqurnainj.com/.htaccess.ssl-bak 2>/dev/null || true
              printf 'Options -Indexes\n' > ~/tools.zulqurnainj.com/.htaccess
              cat ~/tools.zulqurnainj.com/.htaccess
              echo "=== ACME challenge test (server curl) ==="
              mkdir -p ~/tools.zulqurnainj.com/.well-known/acme-challenge/
              echo ACME_OK > ~/tools.zulqurnainj.com/.well-known/acme-challenge/tok
              curl -sv --max-time 8 http://tools.zulqurnainj.com/.well-known/acme-challenge/tok 2>&1
              rm -f ~/tools.zulqurnainj.com/.well-known/acme-challenge/tok
              echo "=== AutoSSL check ==="
              uapi SSL start_autossl_check 2>&1
              echo "=== LetsEncrypt install_ssl ==="
              uapi LetsEncrypt install_ssl domains='[{"domain":"tools.zulqurnainj.com","wildcard":false}]' 2>&1 | head -40 || true
            } > /tmp/ssl-diag.txt 2>&1
            echo "=== Posting diagnostic to GitHub issue ==="
            python3 -c "import json,urllib.request as u,os; c=open('/tmp/ssl-diag.txt').read()[:50000]; d=json.dumps({'title':'SSL Diag','body':c}).encode(); r=u.Request('https://api.github.com/repos/Zulqurnain/zulqurnainj.com/issues',data=d,headers={'Authorization':'token '+os.environ['GH_PAT'],'Content-Type':'application/json'}); print(json.loads(u.urlopen(r).read())['html_url'])" 2>&1 || echo "issue_post_failed"

      - name: Wait 15 min for cert provisioning
        run: sleep 900

      - name: Verify cert from runner
        run: |
          RESULT=$(echo | openssl s_client -connect tools.zulqurnainj.com:443 -servername tools.zulqurnainj.com 2>/dev/null | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null)
          echo "$RESULT"
          echo "$RESULT" | grep -qi "tools.zulqurnainj.com" && echo "PASS" || { echo "FAIL"; exit 1; }

      - name: Re-enable HTTPS redirect
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: |
            [ -f ~/tools.zulqurnainj.com/.htaccess.ssl-bak ] && mv ~/tools.zulqurnainj.com/.htaccess.ssl-bak ~/tools.zulqurnainj.com/.htaccess || true
            uapi HTTP enable_force_https domain=tools.zulqurnainj.com 2>&1 || true
            echo "HTTPS redirect re-enabled"
