name: Fix SSL for tools subdomain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AutoSSL via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: |
            echo "=== Triggering cPanel AutoSSL ==="
            uapi SSL start_autossl_check && echo "AutoSSL started" || echo "uapi failed"

            echo "=== Current cert SANs for tools.zulqurnainj.com ==="
            uapi SSL fetch_best_for_domain domain=tools.zulqurnainj.com \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('data',{}).get('domains','no data'))" \
              || echo "cert check failed"

            echo "=== Listing all hosted SSL domains ==="
            uapi SSL list_certs \
              | python3 -c "import sys,json; [print(c.get('domains','')) for c in json.load(sys.stdin).get('result',{}).get('data',[])]" \
              || echo "list failed"

      - name: Wait 45s then verify from runner
        run: |
          sleep 45
          echo "=== TLS cert check ==="
          echo | openssl s_client -connect tools.zulqurnainj.com:443 \
            -servername tools.zulqurnainj.com 2>/dev/null \
            | openssl x509 -noout -subject -issuer -ext subjectAltName 2>/dev/null \
            || echo "TLS check inconclusive from runner (WAF may intercept)"
