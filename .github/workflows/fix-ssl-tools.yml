name: Fix SSL for tools subdomain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose + fix SSL via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: |
            OUT=~/tools.zulqurnainj.com/ssl-diag.txt

            echo "=== ACTUAL cert on server (server→server) ===" > "$OUT"
            echo | openssl s_client -connect tools.zulqurnainj.com:443 -servername tools.zulqurnainj.com 2>/dev/null | openssl x509 -noout -subject -issuer -dates -ext subjectAltName >> "$OUT" 2>&1 || echo "openssl check failed" >> "$OUT"

            echo "=== HTTP .well-known ACME test ===" >> "$OUT"
            mkdir -p ~/tools.zulqurnainj.com/.well-known/acme-challenge/
            echo "test" > ~/tools.zulqurnainj.com/.well-known/acme-challenge/testfile
            curl -s --max-time 5 "http://tools.zulqurnainj.com/.well-known/acme-challenge/testfile" >> "$OUT" 2>&1
            rm -f ~/tools.zulqurnainj.com/.well-known/acme-challenge/testfile

            echo "=== cPanel sub-domains ===" >> "$OUT"
            uapi DomainInfo domains_data 2>&1 | python3 -c "import sys,json; d=json.load(sys.stdin).get('result',{}).get('data',{}); [print(s.get('domain','')) for s in d.get('sub_domains',[])]" >> "$OUT" 2>&1 || echo "failed" >> "$OUT"

            echo "=== existing SSL certs ===" >> "$OUT"
            uapi SSL list_certs 2>&1 | python3 -c "import sys,json; [print(c.get('subject',{}).get('commonName','?'),'->',str(c.get('domains',''))) for c in json.load(sys.stdin).get('result',{}).get('data',[])]" >> "$OUT" 2>&1 || echo "failed" >> "$OUT"

            echo "=== autossl coverage ===" >> "$OUT"
            uapi SSL check_autossl_coverage 2>&1 | head -80 >> "$OUT" || echo "failed" >> "$OUT"

            echo "=== LetsEncrypt install ===" >> "$OUT"
            uapi LetsEncrypt install_ssl domains='[{"domain":"tools.zulqurnainj.com","wildcard":false}]' 2>&1 | head -20 >> "$OUT" || echo "failed" >> "$OUT"

            echo "=== autossl start ===" >> "$OUT"
            uapi SSL start_autossl_check 2>&1 | head -10 >> "$OUT" || echo "failed" >> "$OUT"

            chmod 644 "$OUT"

      - name: Fetch diagnostics and upload as artifact
        run: |
          sleep 3
          curl -sf --max-time 15 http://tools.zulqurnainj.com/ssl-diag.txt -o ssl-diag.txt \
            || echo "HTTP fetch failed" > ssl-diag.txt
          echo "=== DIAG ==="
          cat ssl-diag.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ssl-diag
          path: ssl-diag.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: rm -f ~/tools.zulqurnainj.com/ssl-diag.txt

      - name: Wait 5min for AutoSSL to provision cert
        run: sleep 300

      - name: Verify cert — FAIL if missing
        run: |
          RESULT=$(echo | openssl s_client -connect tools.zulqurnainj.com:443 -servername tools.zulqurnainj.com 2>/dev/null | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null)
          echo "$RESULT"
          echo "$RESULT" | grep -qi "tools.zulqurnainj.com" && echo "PASS" || { echo "FAIL"; exit 1; }
