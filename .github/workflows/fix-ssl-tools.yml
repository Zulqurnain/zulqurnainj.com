name: Fix SSL for tools subdomain

on:
  workflow_dispatch:

jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AutoSSL via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21098
          script: |
            echo "=== Triggering cPanel AutoSSL ==="
            uapi SSL start_autossl_check && echo "AutoSSL started" || echo "uapi failed"

            echo "=== Current cert SANs for tools.zulqurnainj.com ==="
            uapi SSL fetch_best_for_domain domain=tools.zulqurnainj.com \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('data',{}).get('domains','no data'))" \
              || echo "cert check failed"

      - name: Wait 60s for AutoSSL to propagate
        run: sleep 60

      - name: Verify cert directly — FAIL if not valid
        run: |
          echo "=== Verifying TLS cert for tools.zulqurnainj.com ==="
          RESULT=$(echo | openssl s_client \
            -connect tools.zulqurnainj.com:443 \
            -servername tools.zulqurnainj.com 2>/dev/null \
            | openssl x509 -noout -subject -issuer -dates -ext subjectAltName 2>/dev/null)
          echo "$RESULT"

          if echo "$RESULT" | grep -q "tools.zulqurnainj.com"; then
            echo "PASS: cert covers tools.zulqurnainj.com"
          else
            echo "FAIL: cert does NOT cover tools.zulqurnainj.com"
            exit 1
          fi

      - name: Check HTTPS loads correctly
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            "https://tools.zulqurnainj.com/prompt-health-checker/")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "PASS: site returns 200"
          else
            echo "WARN: site returned $STATUS (may be WAF on runner IP)"
          fi
