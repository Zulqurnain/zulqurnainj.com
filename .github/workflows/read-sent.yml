name: Read Sent + Fresh Gmail Test

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  read:
    runs-on: ubuntu-latest
    env:
      H: ${{ secrets.CPANEL_HOST }}
      EU: me@zulqurnainj.com
      EP: ${{ secrets.EMAIL_PASSWORD }}
      GT: ${{ secrets.GITHUB_TOKEN }}
      GR: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
      - name: read sent folder and send fresh Gmail test
        run: python3 scripts/read_sent.py
