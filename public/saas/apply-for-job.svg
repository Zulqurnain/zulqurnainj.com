<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3a00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c5700;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#5c5700;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="340" cy="40" r="60" fill="#6b6500" opacity="0.15"/>
  <circle cx="60" cy="200" r="80" fill="#6b6500" opacity="0.1"/>

  <!-- Email icon -->
  <rect x="30" y="50" width="100" height="72" rx="8" fill="url(#card)" stroke="#a09600" stroke-width="1.5" stroke-opacity="0.4"/>
  <polyline points="30,58 80,90 130,58" fill="none" stroke="#a09600" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Arrow right -->
  <line x1="148" y1="86" x2="172" y2="86" stroke="#6b6500" stroke-width="2" stroke-linecap="round"/>
  <polyline points="165,80 173,86 165,92" fill="none" stroke="#6b6500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- AI brain icon -->
  <circle cx="200" cy="86" r="20" fill="url(#card)" stroke="#a09600" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="200" y="92" text-anchor="middle" font-size="18" fill="#c8b800" opacity="0.9">✦</text>

  <!-- Arrow right -->
  <line x1="228" y1="86" x2="252" y2="86" stroke="#6b6500" stroke-width="2" stroke-linecap="round"/>
  <polyline points="245,80 253,86 245,92" fill="none" stroke="#6b6500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Send icon -->
  <rect x="270" y="64" width="100" height="44" rx="8" fill="url(#card)" stroke="#a09600" stroke-width="1.5" stroke-opacity="0.4"/>
  <polygon points="278,74 370,86 278,98 290,86" fill="#a09600" opacity="0.7"/>

  <!-- Labels -->
  <text x="80" y="142" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a09600" opacity="0.7">Job Post</text>
  <text x="200" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a09600" opacity="0.7">AI Extract</text>
  <text x="320" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#a09600" opacity="0.7">Send Email</text>

  <!-- Bottom text -->
  <text x="200" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#e8d800" opacity="0.9">Apply for Job</text>
  <text x="200" y="198" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a09600" opacity="0.7">Paste · Extract · Apply in one click</text>

  <!-- Dot row -->
  <circle cx="170" cy="218" r="3" fill="#a09600" opacity="0.3"/>
  <circle cx="185" cy="218" r="3" fill="#a09600" opacity="0.5"/>
  <circle cx="200" cy="218" r="3" fill="#a09600" opacity="0.8"/>
  <circle cx="215" cy="218" r="3" fill="#a09600" opacity="0.5"/>
  <circle cx="230" cy="218" r="3" fill="#a09600" opacity="0.3"/>
</svg>
